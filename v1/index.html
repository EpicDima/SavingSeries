<!doctype html>
<html lang="ru" onclick="collapseChangeContainers()">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1,maximum-scale=1,maxshrink-to-fit=no" name="viewport">
    <meta content="#282828fd" name="theme-color">
    <title>SavingSeries</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
<header>
    <nav class="navbar navbar-dark navbar-expand-xl justify-content-center fixed-top">
        <div class="d-flex w-50 mr-auto"><a class="navbar-brand" href>SavingSeries</a></div>
        <button class="navbar-toggler" data-target="#collapsingNavbar" data-toggle="collapse" type="button"><span
                class="navbar-toggler-icon"></span></button>
        <div class="navbar-collapse collapse w-100" id="collapsingNavbar">
            <ul class="navbar-nav w-100 justify-content-center">
                <form class="form-inline w-100"><input aria-label="Поиск" class="form-control w-100" id="search"
                                                       oninput="searchSeries()" placeholder="Поиск" type="search">
                </form>
            </ul>
            <ul class="nav navbar-nav ml-auto w-100 justify-content-end">
                <li class="nav-item">
                    <div class="nav-link" data-target="#addModal" data-toggle="modal" onclick="clearAddInputs()">
                        Добавление
                    </div>
                </li>
                <li class="nav-item">
                    <div class="nav-link" data-target="#sortModal" data-toggle="modal" onclick="updateSortType()">
                        Сортировка
                    </div>
                </li>
                <li class="nav-item dropdown">
                    <div aria-expanded="false" aria-haspopup="true" class="nav-link dropdown-toggle"
                         data-offset="100,200" data-toggle="dropdown" role="button">Настройки
                    </div>
                    <div class="dropdown-menu dropdown-menu-right">
                        <div class="dropdown-item" onclick="createBackup()">Создать Backup</div>
                        <div class="dropdown-item" onclick="loadBackup()">Загрузить Backup</div>
                        <div class="dropdown-item" onclick="goToActual()">Актуальная версия</div>
                    </div>
                </li>
            </ul>
        </div>
    </nav>
</header>
<div aria-hidden="true" aria-labelledby="centerSortTitleModal" class="modal fade" id="sortModal" role="dialog">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="centerSortTitleModal">Сортировка</h5>
                <button aria-label="Close" class="close" data-dismiss="modal" type="button"><span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="list-group">
                    <div class="list-group-item list-group-item-action sort-type" data-toggle="list">По порядку
                        добавления
                    </div>
                    <div class="list-group-item list-group-item-action sort-type" data-toggle="list">По названию</div>
                    <div class="list-group-item list-group-item-action sort-type" data-toggle="list">По номеру сезона
                    </div>
                    <div class="list-group-item list-group-item-action sort-type" data-toggle="list">По номеру серии
                    </div>
                    <div class="list-group-item list-group-item-action sort-type" data-toggle="list">По дате</div>
                </div>
                <br>
                <div class="form-check-inline"><input class="form-check-input" id="reverseSort" type="checkbox"> <label
                        class="form-check-label" for="reverseSort">В обратном порядке</label></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-dismiss="modal" type="button">Отмена</button>
                <button class="btn btn-primary" onclick="saveSortType()" type="button">Сортировать</button>
            </div>
        </div>
    </div>
</div>
<div aria-hidden="true" aria-labelledby="centerAddTitleModal" class="modal fade" id="addModal" role="dialog">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title" id="centerAddTitleModal">Добавление</h5>
                <button aria-label="Close" class="close" data-dismiss="modal" type="button"><span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form id="addForm" name="add" onsubmit="return false;">
                    <div class="form-group row"><label class="col-4 col-form-label">Название</label>
                        <div class="col-8"><input aria-label="Название" class="form-control" maxlength="100"
                                                  minlength="1" name="name" oninput="nameExists()" required></div>
                    </div>
                    <div class="form-group row"><label class="col-4 col-form-label">Сезон</label>
                        <div class="col-8"><input aria-label="Сезон" class="form-control" max="50" min="1" name="season"
                                                  required type="number" value="1"></div>
                    </div>
                    <div class="form-group row"><label class="col-4 col-form-label">Серия</label>
                        <div class="col-8"><input aria-label="Серия" class="form-control" max="50000" min="1"
                                                  name="episode" required type="number" value="1"></div>
                    </div>
                    <div class="form-group row"><label class="col-4 col-form-label">Дата</label>
                        <div class="col-8"><input aria-label="Дата" class="form-control" name="date" type="date"></div>
                    </div>
                    <div class="form-group row"><label class="col-4 col-form-label">Сайт</label>
                        <div class="col-8"><input aria-label="Сайт" class="form-control" name="site" type="url"></div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-dismiss="modal" type="button">Отмена</button>
                <button class="btn btn-primary" form="addForm" onclick="addSeries()" type="submit">Добавить</button>
            </div>
        </div>
    </div>
</div>
<main class="container text-center">
    <div class="row justify-content-center" id="content"></div>
</main>
<script src="main.js"></script>
</body>
</html>
